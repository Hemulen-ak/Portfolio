<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Arun Karki</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>

<body>

    <nav id="navbar">
        <a href="index.html" class="nav-brand">AK</a>
        <div class="nav-links">
            <a href="about.html" data-tooltip="About"><i class="fa-solid fa-user-astronaut"></i></a>
            <a href="skills.html" data-tooltip="Skills"><i class="fa-solid fa-bolt"></i></a>
            <a href="experience.html" data-tooltip="Experience"><i class="fa-solid fa-briefcase"></i></a>
            <a href="portfolio.html" data-tooltip="Portfolio"><i class="fa-solid fa-folder-open"></i></a>
        </div>
        <div class="nav-cta">
            <a href="contact.html" class="btn-nav-icon active" data-tooltip="Hire Me"><i
                    class="fa-solid fa-comment-dots"></i></a>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="contact-grid">
                <div class="contact-info">
                    <p
                        style="color: var(--accent-amber); font-family: var(--font-heading); font-weight: 500; font-size: 0.8rem; margin-bottom: 1.5rem; letter-spacing: 0.2em;">
                        LET'S WORK TOGETHER</p>
                    <h2 class="heading-clash" style="margin-bottom: 2rem;">Ready to Build Something Great?</h2>

                    <div style="display: flex; flex-direction: column; gap: 2.5rem;">
                        <div style="display: flex; align-items: flex-start; gap: 1.5rem;">
                            <i class="fas fa-envelope"
                                style="color: var(--accent-amber); font-size: 1.2rem; margin-top: 5px;"></i>
                            <div>
                                <h4 class="heading-clash" style="font-size: 0.8rem; margin-bottom: 5px;">Email Directly
                                </h4>
                                <p style="color: var(--text-off-white); font-size: 1rem;">info.arunkarki@gmail.com</p>
                            </div>
                        </div>
                        <div style="display: flex; align-items: flex-start; gap: 1.5rem;">
                            <i class="fas fa-phone-alt"
                                style="color: var(--accent-amber); font-size: 1.2rem; margin-top: 5px;"></i>
                            <div>
                                <h4 class="heading-clash" style="font-size: 0.8rem; margin-bottom: 5px;">Call or
                                    WhatsApp</h4>
                                <p style="color: var(--text-off-white); font-size: 1rem;">+977 9861899728</p>
                            </div>
                        </div>
                    </div>

                    <div style="margin-top: 3rem; display: flex; gap: 2rem;">
                        <a href="https://www.instagram.com/im_ak_1021" target="_blank" rel="noopener noreferrer"
                            style="color: var(--accent-amber); font-size: 1.5rem;"><i class="fab fa-instagram"></i></a>
                        <a href="https://www.tiktok.com/@lutokachuwa" target="_blank" rel="noopener noreferrer"
                            style="color: var(--accent-amber); font-size: 1.5rem;"><i class="fab fa-tiktok"></i></a>
                        <a href="https://www.facebook.com/qo88xnzxio" target="_blank" rel="noopener noreferrer"
                            style="color: var(--accent-amber); font-size: 1.5rem;"><i class="fab fa-facebook-f"></i></a>
                    </div>
                </div>

                <div
                    style="background: var(--bg-card); padding: clamp(1.5rem, 5vw, 3rem); border: 1px solid var(--border-subtle); border-radius: 12px; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.3);">
                    <form id="contact-form" action="https://formspree.io/f/mkopjqnd" method="POST"
                        style="display: flex; flex-direction: column; gap: 1.5rem;">
                        <input type="hidden" name="_subject" value="New message from your portfolio!">
                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <label class="heading-clash" style="font-size: 0.7rem; color: var(--accent-amber);">Your
                                Name</label>
                            <input type="text" name="name" placeholder="WHAT SHOULD I CALL YOU?" required
                                style="background: transparent; border: none; border-bottom: 1px solid var(--border-subtle); padding: 1rem 0.5rem; color: var(--text-off-white); font-family: var(--font-body); outline: none; transition: 0.3s; width: 100%;">
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <label class="heading-clash" style="font-size: 0.7rem; color: var(--accent-amber);">Email
                                Address</label>
                            <input type="email" name="email" placeholder=".....@EMAIL.COM" required
                                style="background: transparent; border: none; border-bottom: 1px solid var(--border-subtle); padding: 1rem 0.5rem; color: var(--text-off-white); font-family: var(--font-body); outline: none; transition: 0.3s; width: 100%;">
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <label class="heading-clash"
                                style="font-size: 0.7rem; color: var(--accent-amber);">Message</label>
                            <textarea name="message" placeholder="HOW CAN I HELP?" rows="4"
                                style="background: transparent; border: none; border-bottom: 1px solid var(--border-subtle); padding: 1rem 0.5rem; color: var(--text-off-white); font-family: var(--font-body); outline: none; transition: 0.3s; resize: none; width: 100%;"></textarea>
                        </div>

                        <button type="submit" class="btn-premium btn-primary"
                            style="border: none; margin-top: 1rem; cursor: pointer;">
                            Send Message <i class="fas fa-paper-plane" style="margin-left: 10px;"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer
        style="padding: 4rem var(--site-padding); background: var(--bg-card); border-top: 1px solid var(--border-subtle); text-align: center;">
        <p style="font-size: 0.8rem; letter-spacing: 0.1em; color: var(--text-muted);">© 2026 Arun Karki |
            arunkarki1023.com.np</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
